
<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyKaam - Roz ke kaam asaan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 500px; margin: 50px auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { color: #667eea; text-align: center; margin-bottom: 10px; }
        p { text-align: center; color: #666; margin-bottom: 20px; }
        .input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; }
        button { padding: 12px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        button:hover { background: #764ba2; }
        ul { list-style: none; }
        li { background: #f8f9fa; padding: 12px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .delete { background: #ff4757; padding: 5px 10px; font-size: 14px; }
        .delete:hover { background: #e84118; }
    </style>
</head>
<body>
    <div class="container">
        <h1>DailyKaam ✅</h1>
        <p>Roz ke kaam asaan!</p>
        
        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Naya kaam likho...">
            <button onclick="addTask()">Add</button>
        </div>
        
        <ul id="taskList"></ul>
    </div>

    <script>
        function addTask() {
            let input = document.getElementById("taskInput");
            let task = input.value;
            if(task === "") return;
            
            let li = document.createElement("li");
            li.innerHTML = task + ' <button class="delete" onclick="this.parentElement.remove()">Delete</button>';
            document.getElementById("taskList").appendChild(li);
            input.value = "";
        }
        
        document.getElementById("taskInput").addEventListener("keypress", function(e) {
            if(e.key === "Enter") addTask();
        });
    </script>
</body>
</html>
<div class="container" style="margin-top: 20px;">
    <h1>Calculator 🧮</h1>
    <input type="number" id="num1" placeholder="Pehla number">
    <input type="number" id="num2" placeholder="Doosra number">
    <button onclick="add()">Jama</button>
    <button onclick="minus()">Minus</button>
    <p id="result" style="margin-top:15px; font-size:20px; font-weight:bold;"></p>
</div>

<script>
function add(){
    let n1 = parseFloat(document.getElementById("num1").value);
    let n2 = parseFloat(document.getElementById("num2").value);
    document.getElementById("result").innerText = "Jawab: " + (n1 + n2);
}
function minus(){
    let n1 = parseFloat(document.getElementById("num1").value);
    let n2 = parseFloat(document.getElementById("num2").value);
    document.getElementById("result").innerText = "Jawab: " + (n1 - n2);
}
</script>

<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DailyKaam - Roz ke kaam asaan</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
      .container { max-width: 600px; margin: 30px auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0.2); }
        h1 { color: #667eea; text-align: center; margin-bottom: 10px; font-size: 28px; }
        h2 { color: #764ba2; text-align: center; margin-bottom: 15px; font-size: 22px; border-bottom: 3px solid #667eea; padding-bottom: 10px; }
        p { text-align: center; color: #666; margin-bottom: 20px; }
      .input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input, textarea { flex: 1; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; margin-bottom: 10px; }
        button { padding: 12px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 5px; font-weight: bold; }
        button:hover { background: #764ba2; transform: scale(1.05); }
        ul { list-style: none; }
        li { background: #f8f9fa; padding: 12px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
      .delete { background: #ff4757; padding: 5px 10px; font-size: 14px; }
      .delete:hover { background: #e84118; }
      .divider { height: 4px; background: linear-gradient(90deg, #667eea, #764ba2); margin: 40px auto; width: 80%; border-radius: 2px; }
    </style>
</head>
<body>
    <h1 style="color:white; font-size:36px; margin-bottom:30px;">DailyKaam - All in One Tools ✅</h1>

    <!-- TOOL 1: TODO LIST -->
    <div class="container">
        <h2>1. To-Do List 📝</h2>
        <p>Apne roz ke kaam yahan likho</p>
        <div class="input-box">
            <input type="text" id="taskInput" placeholder="Naya kaam likho...">
            <button onclick="addTask()">Add</button>
        </div>
        <ul id="taskList"></ul>
    </div>

    <div class="divider"></div>

    <!-- TOOL 2: CALCULATOR -->
    <div class="container">
        <h2>2. Calculator 🧮</h2>
        <p>Jama aur Minus asani se karo</p>
        <input type="number" id="num1" placeholder="Pehla number">
        <input type="number" id="num2" placeholder="Doosra number">
        <button onclick="add()">Jama</button>
        <button onclick="minus()">Minus</button>
        <p id="result" style="margin-top:15px; font-size:20px; font-weight:bold; text-align:center;"></p>
    </div>

    <div class="divider"></div>

    <!-- TOOL 3: TRANSLATOR -->
    <div class="container">
        <h2>3. Language Translator 🌍</h2>
        <p>Koi bhi zuban likho, English me convert ho jayegi</p>
        <textarea id="translateInput" placeholder="Yahan Urdu, Arabic, Hindi... kuch bhi likho" rows="4"></textarea>
        <button onclick="translateText()">English me Translate karo</button>
        <div id="translateResult" style="margin-top:15px; padding:15px; background:#f8f9fa; border-radius:8px; min-height:50px; font-weight:bold;"></div>
    </div>

    <div class="divider"></div>

    <!-- TOOL 4: PHOTO EDITOR -->
    <div class="container">
        <h2>4. Photo Editor 🖼️</h2>
        <p>Apni pic upload karo aur 1 click me edit karo</p>
        <input type="file" id="imageUpload" accept="image/*" style="margin-bottom:15px;">
        <br>
        <button onclick="applyFilter('grayscale(100%)')">Black & White</button>
        <button onclick="applyFilter('brightness(150%)')">Bright</button>
        <button onclick="applyFilter('blur(5px)')">Blur</button>
        <button onclick="applyFilter('none')">Reset</button>
        <div style="margin-top:20px; text-align:center;">
            <img id="uploadedImage" style="max-width:100%; border-radius:10px; display:none;">
        </div>
        <a id="downloadBtn" style="display:none; margin-top:10px;" download="edited-photo.png">
            <button>Download Photo</button>
        </a>
    </div>

    <script>
        // TODO SCRIPT
        function addTask() {
            let input = document.getElementById("taskInput");
            let task = input.value;
            if(task === "") return;
            let li = document.createElement("li");
            li.innerHTML = task + ' <button class="delete" onclick="this.parentElement.remove()">Delete</button>';
            document.getElementById("taskList").appendChild(li);
            input.value = "";
        }
        document.getElementById("taskInput").addEventListener("keypress", function(e) {
            if(e.key === "Enter") addTask();
        });

        // CALCULATOR SCRIPT
        function add(){
            let n1 = parseFloat(document.getElementById("num1").value) || 0;
            let n2 = parseFloat(document.getElementById("num2").value) || 0;
            document.getElementById("result").innerText = "Jawab: " + (n1 + n2);
        }
        function minus(){
            let n1 = parseFloat(document.getElementById("num1").value) || 0;
            let n2 = parseFloat(document.getElementById("num2").value) || 0;
            document.getElementById("result").innerText = "Jawab: " + (n1 - n2);
        }

        // TRANSLATOR SCRIPT
        async function translateText(){
            let text = document.getElementById("translateInput").value;
            if(text === "") return;
            document.getElementById("translateResult").innerText = "Translating...";
            let url = "https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=en&dt=t&q=" + encodeURI(text);
            let response = await fetch(url);
            let data = await response.json();
            let translated = data[0].map(item => item[0]).join("");
            document.getElementById("translateResult").innerText = translated;
        }

        // PHOTO EDITOR SCRIPT
        let uploadedImage = document.getElementById("uploadedImage");
        let downloadBtn = document.getElementById("downloadBtn");
        document.getElementById("imageUpload").addEventListener("change", function(e){
            let file = e.target.files[0];
            if(file){
                let reader = new FileReader();
                reader.onload = function(event){
                    uploadedImage.src = event.target.result;
                    uploadedImage.style.display = "block";
                    uploadedImage.style.filter = "none";
                    downloadBtn.style.display = "inline-block";
                    downloadBtn.href = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });
        function applyFilter(filter){
            uploadedImage.style.filter = filter;
            let canvas = document.createElement('canvas');
            let ctx = canvas.getContext('2d');
            canvas.width = uploadedImage.naturalWidth;
            canvas.height = uploadedImage.naturalHeight;
            ctx.filter = filter;
            ctx.drawImage(uploadedImage, 0, 0);
            downloadBtn.href = canvas.toDataURL();
        }
    </script>
</body>
</html>
